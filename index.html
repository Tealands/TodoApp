<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="KeepOut\favicon.png">
    <link rel="shortcut icon" type="image/png" href="KeepOut\favicon.png">
    <link rel="apple-touch-icon" href="KeepOut\favicon.png">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ソート付きTODO</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans JP', sans-serif;
            margin: 24px;
            background: #f7f8fb
        }

        .wrap {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(30, 30, 60, 0.06)
        }

        h1 {
            margin: 0 0 12px;
            font-size: 20px
        }

        h2 {
            margin: 24px 0 12px;
            font-size: 18px;
            border-bottom: 2px solid #eee;
            padding-bottom: 4px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap
        }

        input[type=text],
        input[type=datetime-local] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px
        }

        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: 0;
            background: #2563eb;
            color: #fff;
            cursor: pointer
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0
        }

        li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-bottom: 1px solid #f0f2f6;
            flex-wrap: wrap
        }

        li .txt {
            flex: 1
        }

        .small {
            font-size: 12px;
            color: #666
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap
        }

        .muted {
            background: #eee;
            color: #333
        }

        .date-label {
            font-size: 12px;
            color: #888;
            margin-left: 8px;
        }

        .guide {
            background: #f0f4ff;
            border-left: 4px solid #2563eb;
            padding: 10px 14px;
            margin-bottom: 16px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
        }

        #bulk-controls-main,
        #bulk-controls-asap {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .asap-task {
            background-color: #fff9e6;
        }

        .asap-input {
            border-color: #ffc107;
        }

        #status-bar {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }

        #status-bar.ok   { background: #e6f4ea; color: #1a7f37; }
        #status-bar.err  { background: #fde8e8; color: #b91c1c; }
        #status-bar.wait { background: #fef9c3; color: #92400e; }

        /* ── 初回登録画面 ───────────────────────────────── */
        .setup-screen-label {
            font-size: 14px;
            color: #555;
        }

        .setup-title {
            text-align: center;
            font-size: 40px;
            font-weight: 700;
            margin: 8px 0 40px;
            letter-spacing: 1px;
        }

        .setup-options {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .setup-card {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .setup-card .card-head {
            border: 1px solid #2a4a5a;
            padding: 18px 16px;
            width: 100%;
            text-align: center;
            font-size: 17px;
            box-sizing: border-box;
            background: #fff;
        }

        .setup-card .arrow {
            color: #2a6f87;
            font-size: 40px;
            line-height: 1;
            margin: 8px 0;
        }

        .setup-card .card-desc {
            text-align: center;
            color: #2a4a5a;
            font-size: 15px;
            margin-bottom: 14px;
            min-height: 44px;
        }

        .setup-card .path-row {
            display: flex;
            gap: 6px;
            width: 100%;
            margin-bottom: 8px;
        }

        .setup-card input[type=text] {
            flex: 1;
            padding: 9px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 0;
        }

        .setup-card .browse-btn {
            background: #64748b;
            white-space: nowrap;
        }

        .setup-card .submit-btn {
            width: 100%;
            background: #2a6f87;
            padding: 11px;
            font-size: 15px;
        }

        #setup-error {
            color: #b91c1c;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
            white-space: pre-wrap;
        }

        .hidden { display: none !important; }
    </style>
</head>

<body>
    <!-- ── 初回登録画面 ───────────────────────────────── -->
    <div class="wrap hidden" id="setup-screen">
        <div class="setup-screen-label">初回登録画面</div>
        <div class="setup-title">TodoApp</div>

        <div class="setup-options">
            <!-- 既存のDBを参照 -->
            <div class="setup-card">
                <div class="card-head">既存のデータベース<br>を参照する</div>
                <div class="arrow">↓</div>
                <div class="card-desc">Microsoft Access<br>DataBaseファイルを参照</div>
                <div class="path-row">
                    <input type="text" id="existing-path" placeholder="例: C:\Users\you\OneDrive\Todo.accdb" />
                    <button class="browse-btn" id="browse-existing">参照</button>
                </div>
                <button class="submit-btn" id="use-existing">このDBを使う</button>
            </div>

            <!-- 新規DBを作成 -->
            <div class="setup-card">
                <div class="card-head">新規データベース<br>を作成する</div>
                <div class="arrow">↓</div>
                <div class="card-desc">任意のフォルダーを参照し、<br>MADファイルを作成する</div>
                <div class="path-row">
                    <input type="text" id="new-folder" placeholder="保存先フォルダー" />
                    <button class="browse-btn" id="browse-folder">参照</button>
                </div>
                <div class="path-row">
                    <input type="text" id="new-filename" placeholder="ファイル名（例: Todo.accdb）" value="SortTodoDatabase.accdb" />
                </div>
                <button class="submit-btn" id="create-new">このフォルダーに作成</button>
            </div>
        </div>

        <div id="setup-error"></div>
    </div>

    <!-- ── メインアプリ ───────────────────────────────── -->
    <div class="wrap hidden" id="app-screen">
        <h1>ソート付きTODO</h1>

        <div class="guide">
            <strong>使い方：</strong>
            <ul style="margin:6px 0 0 16px;">
                <li><b>ASAPゾーン：</b> 最優先タスク。締切は設定できません。</li>
                <li><b>メインリスト：</b> 通常のタスク。締切日時を設定可能。</li>
                <li>タスクはAccessデータベースに自動保存されます。</li>
            </ul>
        </div>

        <span id="status-bar" class="wait">接続中...</span>

        <h2>🔥 ASAPゾーン</h2>
        <div class="input-row">
            <input id="asap-input" type="text" placeholder="ASAPでやることを入力" class="asap-input" />
            <button id="add-asap-btn">追加</button>
        </div>
        <div id="bulk-controls-asap">
            <input type="checkbox" id="select-all-asap"> <label for="select-all-asap">全選択</label>
            <button id="delete-selected-asap" class="muted">✔ ASAPタスクを削除</button>
        </div>
        <ul id="list-asap"></ul>

        <h2>✅ メインリスト</h2>
        <div class="input-row">
            <input id="todo-input" type="text" placeholder="やることを入力" />
            <input id="todo-date" type="datetime-local" style="max-width:180px;" />
            <button id="add-btn">追加</button>
        </div>
        <div id="bulk-controls-main">
            <input type="checkbox" id="select-all-main"> <label for="select-all-main">全選択</label>
            <button id="delete-selected-main" class="muted">✔ メインタスクを削除</button>
        </div>
        <ul id="list-main"></ul>

        <hr>

        <div class="controls">
            <button id="export-btn" class="muted">JSONでエクスポート</button>
            <button id="change-db-btn" class="muted">DB設定を変更</button>
        </div>

        <p class="small">
            保存先: <code id="db-path-label">-</code>
        </p>
    </div>

    <script>
        const API = '/api';
        let todos = [];
        let asapTodos = [];

        const input        = document.getElementById('todo-input');
        const dateInput    = document.getElementById('todo-date');
        const addBtn       = document.getElementById('add-btn');
        const listMainEl   = document.getElementById('list-main');
        const asapInput    = document.getElementById('asap-input');
        const addAsapBtn   = document.getElementById('add-asap-btn');
        const listAsapEl   = document.getElementById('list-asap');
        const selectAllMain    = document.getElementById('select-all-main');
        const deleteSelectedMain = document.getElementById('delete-selected-main');
        const selectAllAsap    = document.getElementById('select-all-asap');
        const deleteSelectedAsap = document.getElementById('delete-selected-asap');
        const exportBtn    = document.getElementById('export-btn');
        const statusBar    = document.getElementById('status-bar');

        // ── 初回登録画面の要素 ──────────────────────────────
        const setupScreen   = document.getElementById('setup-screen');
        const appScreen     = document.getElementById('app-screen');
        const existingPath  = document.getElementById('existing-path');
        const browseExisting= document.getElementById('browse-existing');
        const useExistingBtn= document.getElementById('use-existing');
        const newFolder     = document.getElementById('new-folder');
        const newFilename   = document.getElementById('new-filename');
        const browseFolder  = document.getElementById('browse-folder');
        const createNewBtn  = document.getElementById('create-new');
        const setupError    = document.getElementById('setup-error');
        const changeDbBtn   = document.getElementById('change-db-btn');
        const dbPathLabel   = document.getElementById('db-path-label');

        const DB_PATH_KEY = 'todoapp_db_path';

        function setStatus(msg, type) {
            statusBar.textContent = msg;
            statusBar.className = type;
        }

        // ── API ヘルパー ────────────────────────────────────
        async function apiFetch(path, opts = {}) {
            const res = await fetch(API + path, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        async function loadTasks() {
            setStatus('読み込み中...', 'wait');
            try {
                const tasks = await apiFetch('/tasks');
                todos     = tasks.filter(t => t.listType === 'main');
                asapTodos = tasks.filter(t => t.listType === 'asap');
                setStatus('Accessデータベースに接続済み', 'ok');
                render();
            } catch (e) {
                setStatus('サーバーに接続できません。app.py が起動しているか確認してください。', 'err');
            }
        }

        async function apiAdd(task) {
            return apiFetch('/tasks', { method: 'POST', body: JSON.stringify(task) });
        }

        async function apiUpdate(id, task) {
            return apiFetch(`/tasks/${id}`, { method: 'PUT', body: JSON.stringify(task) });
        }

        async function apiDelete(id) {
            return apiFetch(`/tasks/${id}`, { method: 'DELETE' });
        }

        // ── 描画 ────────────────────────────────────────────
        function createTaskElement(t, listType) {
            const li = document.createElement('li');
            if (listType === 'asap') li.classList.add('asap-task');

            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = `select-task-${listType}`;
            chk.dataset.id = t.id;

            const done = document.createElement('input');
            done.type = 'checkbox';
            done.checked = !!t.done;
            done.addEventListener('change', async () => {
                t.done = done.checked;
                await apiUpdate(t.id, t);
                render();
            });

            const span = document.createElement('span');
            span.className = 'txt';
            span.textContent = t.text;
            if (t.done) span.style.textDecoration = 'line-through';

            if (listType === 'main' && t.date) {
                const dateLabel = document.createElement('span');
                dateLabel.className = 'date-label';
                const d = new Date(t.date);
                const wd = ['日','月','火','水','木','金','土'][d.getDay()];
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                dateLabel.textContent = `期限:${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}(${wd}) ${hh}:${mm}`;
                li.appendChild(dateLabel);
            }

            const edit = document.createElement('button');
            edit.textContent = '編集';
            edit.className = 'muted';
            edit.addEventListener('click', async () => {
                const v = prompt('編集してください', t.text);
                if (v !== null) {
                    t.text = v.trim();
                    await apiUpdate(t.id, t);
                    render();
                }
            });

            const del = document.createElement('button');
            del.textContent = '削除';
            del.className = 'muted';
            del.addEventListener('click', async () => {
                if (confirm('削除しますか？')) {
                    await apiDelete(t.id);
                    if (listType === 'main') todos     = todos.filter(x => x.id !== t.id);
                    else                     asapTodos = asapTodos.filter(x => x.id !== t.id);
                    render();
                }
            });

            li.prepend(chk, done, span);
            li.append(edit, del);
            return li;
        }

        function render() {
            listMainEl.innerHTML = '';
            todos.sort((a, b) => {
                if (!a.date && !b.date) return (a.createdAt || '').localeCompare(b.createdAt || '');
                if (!a.date) return 1;
                if (!b.date) return -1;
                return a.date.localeCompare(b.date);
            });
            todos.forEach(t => listMainEl.appendChild(createTaskElement(t, 'main')));

            listAsapEl.innerHTML = '';
            asapTodos.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
            asapTodos.forEach(t => listAsapEl.appendChild(createTaskElement(t, 'asap')));
        }

        // ── タスク追加 ──────────────────────────────────────
        async function addTodo(text, date, listType) {
            text = text.trim();
            if (!text) return;
            const task = { text, done: false, createdAt: new Date().toISOString(), date: date || null, listType };
            try {
                const saved = await apiAdd(task);
                if (listType === 'main') todos.push(saved);
                else                     asapTodos.push(saved);
                render();
            } catch (e) {
                alert('保存に失敗しました: ' + e.message);
            }
        }

        addBtn.addEventListener('click', () => {
            addTodo(input.value, dateInput.value, 'main');
            input.value = ''; dateInput.value = '';
        });

        addAsapBtn.addEventListener('click', () => {
            addTodo(asapInput.value, null, 'asap');
            asapInput.value = '';
        });

        // Enterキーで追加
        input.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
        asapInput.addEventListener('keydown', e => { if (e.key === 'Enter') addAsapBtn.click(); });

        // ── 一括削除 ────────────────────────────────────────
        selectAllMain.addEventListener('change', () => {
            document.querySelectorAll('.select-task-main').forEach(c => c.checked = selectAllMain.checked);
        });

        deleteSelectedMain.addEventListener('click', async () => {
            const checks = [...document.querySelectorAll('.select-task-main:checked')];
            if (checks.length === 0) return alert('削除するタスクを選んでください。');
            if (!confirm(`${checks.length}件のメインタスクを削除しますか？`)) return;
            const ids = checks.map(c => Number(c.dataset.id));
            await Promise.all(ids.map(id => apiDelete(id)));
            todos = todos.filter(t => !ids.includes(t.id));
            render();
        });

        selectAllAsap.addEventListener('change', () => {
            document.querySelectorAll('.select-task-asap').forEach(c => c.checked = selectAllAsap.checked);
        });

        deleteSelectedAsap.addEventListener('click', async () => {
            const checks = [...document.querySelectorAll('.select-task-asap:checked')];
            if (checks.length === 0) return alert('削除するASAPタスクを選んでください。');
            if (!confirm(`${checks.length}件のASAPタスクを削除しますか？`)) return;
            const ids = checks.map(c => Number(c.dataset.id));
            await Promise.all(ids.map(id => apiDelete(id)));
            asapTodos = asapTodos.filter(t => !ids.includes(t.id));
            render();
        });

        // ── JSONエクスポート ────────────────────────────────
        exportBtn.addEventListener('click', () => {
            const allData = { todos, asapTodos };
            if (!todos.length && !asapTodos.length) return alert('データがありません');
            const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'todos_backup.json'; a.click();
            URL.revokeObjectURL(url);
        });

        // ── 初回登録画面のロジック ──────────────────────────
        function showSetup() {
            setupScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            setupError.textContent = '';
        }

        function showApp(path) {
            setupScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            if (path) {
                localStorage.setItem(DB_PATH_KEY, path);
                dbPathLabel.textContent = path;
            }
            loadTasks();
        }

        // ネイティブダイアログで参照（使えない環境では手入力にフォールバック）
        async function browse(type) {
            try {
                const res = await apiFetch(`/browse?type=${type}`);
                if (res.supported === false) {
                    alert('この環境ではダイアログを開けません。パスを直接入力してください。');
                    return null;
                }
                return res.path || null;
            } catch (e) {
                alert('参照に失敗しました。パスを直接入力してください。');
                return null;
            }
        }

        // DBパスをサーバーに設定する
        async function configureDb(mode, path) {
            setupError.textContent = '';
            if (!path) {
                setupError.textContent = 'パスを入力してください。';
                return;
            }
            try {
                const res = await fetch(API + '/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode, path }),
                });
                const data = await res.json();
                if (!res.ok) {
                    setupError.textContent = data.error || '設定に失敗しました。';
                    return;
                }
                showApp(data.path);
            } catch (e) {
                setupError.textContent = 'サーバーに接続できません。app.py が起動しているか確認してください。';
            }
        }

        browseExisting.addEventListener('click', async () => {
            const p = await browse('file');
            if (p) existingPath.value = p;
        });

        browseFolder.addEventListener('click', async () => {
            const p = await browse('folder');
            if (p) newFolder.value = p;
        });

        useExistingBtn.addEventListener('click', () => {
            configureDb('existing', existingPath.value.trim());
        });

        createNewBtn.addEventListener('click', () => {
            const folder = newFolder.value.trim();
            let name = newFilename.value.trim() || 'SortTodoDatabase.accdb';
            if (!folder) {
                setupError.textContent = '保存先フォルダーを入力してください。';
                return;
            }
            // フォルダーとファイル名を結合（Windowsパス）
            const sep = folder.endsWith('\\') || folder.endsWith('/') ? '' : '\\';
            configureDb('new', folder + sep + name);
        });

        changeDbBtn.addEventListener('click', async () => {
            if (!confirm('DB設定をリセットして初回登録画面に戻りますか？\n（データベースのデータは削除されません）')) return;
            try {
                await fetch(API + '/config', { method: 'DELETE' });
            } catch (e) { /* ignore */ }
            localStorage.removeItem(DB_PATH_KEY);
            showSetup();
        });

        // localStorageのパスでサーバーへ無言で再接続する（2回目以降の自動ログイン）
        async function reconnectFromStorage(path) {
            const res = await fetch(API + '/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: 'existing', path }),
            });
            return res.ok;
        }

        // ── 起動 ─────────────────────────────────────────────
        async function init() {
            // 1. localStorageにパスがあれば、登録作業なしで自動接続する
            const savedPath = localStorage.getItem(DB_PATH_KEY);
            if (savedPath) {
                try {
                    if (await reconnectFromStorage(savedPath)) {
                        showApp(savedPath);
                        return;
                    }
                    // ファイルが見つからない等で失敗 → 保存パスを破棄して登録画面へ
                    localStorage.removeItem(DB_PATH_KEY);
                } catch (e) {
                    showSetup();
                    setupError.textContent = 'サーバーに接続できません。app.py が起動しているか確認してください。';
                    return;
                }
            }

            // 2. localStorageに無い場合はサーバーの設定状況を確認
            try {
                const cfg = await apiFetch('/config');
                if (cfg.configured) {
                    showApp(cfg.path);   // localStorageにも保存される
                } else {
                    showSetup();
                }
            } catch (e) {
                showSetup();
                setupError.textContent = 'サーバーに接続できません。app.py が起動しているか確認してください。';
            }
        }

        init();

        // ── 画面を閉じたらバックエンドを自動終了させるためのハートビート ──
        // 2秒ごとにサーバーへpingを送る。タブ/ウインドウを閉じると送信が止まり、
        // サーバー側が一定時間pingを受け取らなければ自分で終了する。
        // （リロードの場合は再読み込み直後にpingが再開するため、誤終了しない）
        (function heartbeat() {
            const PING_INTERVAL = 2000;
            function ping() {
                fetch(API + '/ping', { method: 'POST', keepalive: true }).catch(() => {});
            }
            ping();
            setInterval(ping, PING_INTERVAL);
        })();
    </script>
</body>

</html>
